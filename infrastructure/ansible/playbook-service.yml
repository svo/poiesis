---
- name: Play for creating project service
  hosts: all

  pre_tasks:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
      become: true

  roles:
    - git
    - github-cli
    - python
    - node
    - pipx
    - semgrep
    - tox
    - claude-code-service
    - openclaw
    - shellcheck
    - ansible-lint
